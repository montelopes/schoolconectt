<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SchoolConnect — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles-enhanced.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy: #08152E;
  --navy2: #0D1F3C;
  --navy3: #111827;
  --blue: #1A56DB;
  --blue-lt: #3B82F6;
  --teal: #0891B2;
  --teal-lt: #22D3EE;
  --gold: #F59E0B;
  --amber: #FCD34D;
  --white: #FFFFFF;
  --off: #F8FAFC;
  --off2: #F1F5F9;
  --slate: #64748B;
  --slate-lt: #CBD5E1;
  --slate-dk: #334155;
  --green: #059669;
  --green-lt: #D1FAE5;
  --red: #DC2626;
  --red-lt: #FEE2E2;
  --orange: #EA580C;
  --orange-lt: #FED7AA;
  --purple: #7C3AED;
  --sidebar-w: 260px;
}

body { font-family: 'Sora', sans-serif; background: var(--off); color: var(--slate-dk); display: flex; min-height: 100vh; }

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--navy);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  overflow-y: auto;
}

.sidebar-brand {
  padding: 24px 20px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}

.sidebar-brand .logo {
  width: 44px; height: 44px;
  background: linear-gradient(135deg, var(--teal), var(--blue));
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  margin-bottom: 14px;
}

.sidebar-brand h1 { font-size: 20px; font-weight: 800; color: var(--white); }
.sidebar-brand h1 span { color: var(--teal-lt); }
.sidebar-brand p { font-size: 11px; color: var(--slate); margin-top: 2px; }

.user-card {
  margin: 16px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.user-avatar {
  width: 40px; height: 40px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--teal), var(--blue));
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: var(--white);
  flex-shrink: 0;
}

.user-info .name { font-size: 13px; font-weight: 600; color: var(--white); }
.user-info .role-badge {
  display: inline-block;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 20px;
  margin-top: 3px;
  font-weight: 700;
  letter-spacing: 0.5px;
}

.role-admin    { background: rgba(245,158,11,0.2); color: var(--gold); }
.role-teacher  { background: rgba(8,145,178,0.2);  color: var(--teal-lt); }
.role-parent   { background: rgba(26,86,219,0.2);  color: #93C5FD; }
.role-student  { background: rgba(124,58,237,0.2); color: #C4B5FD; }

nav { flex: 1; padding: 8px 12px; }

.nav-section { font-size: 10px; font-weight: 700; color: var(--slate); letter-spacing: 2px; padding: 14px 8px 6px; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 10px 10px;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.18s;
  color: rgba(255,255,255,0.55);
  font-size: 13.5px;
  font-weight: 500;
  margin-bottom: 2px;
  position: relative;
}

.nav-item:hover { background: rgba(255,255,255,0.07); color: var(--white); }

.nav-item.active {
  background: linear-gradient(135deg, rgba(8,145,178,0.25), rgba(26,86,219,0.2));
  color: var(--white);
  border: 1px solid rgba(34,211,238,0.2);
}

.nav-item .icon { font-size: 17px; width: 22px; text-align: center; }
.nav-item .badge {
  margin-left: auto;
  background: var(--red);
  color: var(--white);
  font-size: 10px;
  font-weight: 700;
  width: 18px; height: 18px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}

.sidebar-footer {
  padding: 16px;
  border-top: 1px solid rgba(255,255,255,0.07);
}

.btn-logout {
  width: 100%;
  padding: 10px;
  background: rgba(220,38,38,0.1);
  border: 1px solid rgba(220,38,38,0.2);
  color: #FCA5A5;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Sora', sans-serif;
  transition: all 0.2s;
}

.btn-logout:hover { background: rgba(220,38,38,0.2); }

/* ── MAIN CONTENT ── */
.main {
  margin-left: var(--sidebar-w);
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.topbar {
  background: var(--white);
  border-bottom: 1px solid #E2E8F0;
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}

.topbar-title h2 { font-size: 20px; font-weight: 700; color: var(--navy); }
.topbar-title p  { font-size: 13px; color: var(--slate); margin-top: 2px; }

.topbar-right { display: flex; align-items: center; gap: 12px; }

.topbar-btn {
  width: 38px; height: 38px;
  border-radius: 10px;
  background: var(--off);
  border: 1px solid #E2E8F0;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 16px;
  transition: all 0.2s;
  position: relative;
}

.topbar-btn:hover { background: var(--off2); }
.topbar-btn .dot { position: absolute; top: 7px; right: 7px; width: 8px; height: 8px; background: var(--red); border-radius: 50%; border: 2px solid var(--white); }

/* ── PAGE SECTIONS ── */
.page { display: none; padding: 28px 32px; }
.page.active { display: block; }

/* ── CARDS ── */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--white);
  border-radius: 16px;
  padding: 22px 20px;
  border: 1px solid #E2E8F0;
  display: flex;
  align-items: center;
  gap: 16px;
  transition: all 0.2s;
  cursor: default;
}

.stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }

.stat-icon {
  width: 52px; height: 52px;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
}

.stat-info .value {
  font-size: 28px;
  font-weight: 800;
  color: var(--navy);
  line-height: 1;
}

.stat-info .label {
  font-size: 12px;
  color: var(--slate);
  margin-top: 4px;
  font-weight: 500;
}

.stat-info .sub {
  font-size: 11px;
  margin-top: 2px;
}

/* ── SECTION CARDS ── */
.section-card {
  background: var(--white);
  border-radius: 16px;
  border: 1px solid #E2E8F0;
  margin-bottom: 20px;
  overflow: hidden;
}

.section-head {
  padding: 18px 22px;
  border-bottom: 1px solid #F1F5F9;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.section-head h3 {
  font-size: 15px;
  font-weight: 700;
  color: var(--navy);
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-body { padding: 16px 22px; }

/* ── TABLE ── */
.data-table { width: 100%; border-collapse: collapse; }
.data-table th {
  font-size: 11px;
  font-weight: 700;
  color: var(--slate);
  letter-spacing: 0.8px;
  text-align: left;
  padding: 8px 12px;
  border-bottom: 2px solid #F1F5F9;
  background: #FAFAFA;
}

.data-table td {
  padding: 13px 12px;
  font-size: 13.5px;
  border-bottom: 1px solid #F1F5F9;
  color: var(--slate-dk);
}

.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: #F8FAFC; }

/* ── BADGES ── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
}

.badge-green  { background: var(--green-lt);  color: var(--green); }
.badge-red    { background: var(--red-lt);    color: var(--red); }
.badge-orange { background: var(--orange-lt); color: var(--orange); }
.badge-blue   { background: #DBEAFE;          color: var(--blue); }
.badge-purple { background: #EDE9FE;          color: var(--purple); }
.badge-gray   { background: #F1F5F9;          color: var(--slate); }
.badge-gold   { background: #FEF3C7;          color: #92400E; }
.badge-navy   { background: #E0E7FF;          color: var(--navy); }

/* ── PROGRESS BAR ── */
.progress-wrap { margin: 6px 0; }
.progress-bar {
  height: 8px;
  background: #F1F5F9;
  border-radius: 100px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  border-radius: 100px;
  transition: width 0.6s ease;
}

/* ── ATTENDANCE CALENDAR ── */
.att-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 4px 0;
}

.att-day {
  width: 34px; height: 34px;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 600;
  cursor: default;
  position: relative;
}

.att-day.presente  { background: var(--green-lt);  color: var(--green); }
.att-day.falta     { background: var(--red-lt);    color: var(--red); }
.att-day.atrasado  { background: var(--orange-lt); color: var(--orange); }
.att-day.fds       { background: #F8FAFC;           color: #CBD5E1; }

.att-day .day-num { font-size: 11px; font-weight: 700; }
.att-day .status-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  position: absolute;
  bottom: 3px;
}

/* ── TASK CARD ── */
.task-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 0;
  border-bottom: 1px solid #F1F5F9;
}

.task-item:last-child { border-bottom: none; }

.task-status-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.task-info { flex: 1; min-width: 0; }
.task-title { font-size: 14px; font-weight: 600; color: var(--navy); }
.task-meta  { font-size: 12px; color: var(--slate); margin-top: 3px; }

.task-deadline {
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
  padding: 4px 10px;
  border-radius: 8px;
}

/* ── EVENT ITEM ── */
.event-item {
  display: flex;
  gap: 14px;
  padding: 12px 0;
  border-bottom: 1px solid #F1F5F9;
  align-items: flex-start;
}

.event-item:last-child { border-bottom: none; }

.event-date-box {
  width: 46px; height: 46px;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-weight: 700;
}

.event-date-box .day  { font-size: 18px; line-height: 1; }
.event-date-box .mon  { font-size: 10px; text-transform: uppercase; }
.event-info .title    { font-size: 13.5px; font-weight: 600; color: var(--navy); }
.event-info .desc     { font-size: 12px; color: var(--slate); margin-top: 3px; }

/* ── GRADE TABLE ── */
.grade-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 500;
  width: 50px;
  text-align: center;
  padding: 4px 8px;
  border-radius: 6px;
}

/* ── SPORT CARD ── */
.sport-card {
  background: var(--white);
  border: 1px solid #E2E8F0;
  border-radius: 14px;
  padding: 18px;
  margin-bottom: 12px;
  transition: all 0.2s;
}

.sport-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.07); }
.sport-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.sport-name   { font-size: 15px; font-weight: 700; color: var(--navy); display: flex; align-items: center; gap: 8px; }
.sport-results { display: flex; gap: 8px; margin-top: 10px; }
.result-chip {
  padding: 4px 10px;
  border-radius: 8px;
  font-size: 11px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
}

/* ── MSG ── */
.msg-item {
  padding: 14px 0;
  border-bottom: 1px solid #F1F5F9;
  cursor: pointer;
  transition: background 0.15s;
}

.msg-item.unread { border-left: 3px solid var(--teal); padding-left: 12px; }
.msg-item:hover  { background: #F8FAFC; }
.msg-item:last-child { border-bottom: none; }
.msg-subject { font-size: 13.5px; font-weight: 600; color: var(--navy); }
.msg-from    { font-size: 12px; color: var(--slate); margin-top: 2px; }
.msg-preview { font-size: 12px; color: var(--slate); margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── BUTTONS ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 9px 16px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  font-family: 'Sora', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  border: none;
  outline: none;
}

.btn-primary { background: var(--teal); color: var(--white); }
.btn-primary:hover { background: var(--teal); filter: brightness(1.1); transform: translateY(-1px); }
.btn-outline { background: transparent; color: var(--teal); border: 1.5px solid var(--teal); }
.btn-outline:hover { background: rgba(8,145,178,0.08); }
.btn-sm { padding: 6px 12px; font-size: 12px; }

/* ── FORM ── */
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.form-group-d label { font-size: 12px; font-weight: 600; color: var(--slate-dk); margin-bottom: 5px; display: block; }
.form-group-d input,
.form-group-d select,
.form-group-d textarea {
  width: 100%;
  padding: 10px 13px;
  border: 1.5px solid #E2E8F0;
  border-radius: 10px;
  font-size: 13.5px;
  font-family: 'Sora', sans-serif;
  color: var(--navy);
  outline: none;
  transition: border-color 0.2s;
  background: var(--white);
}

.form-group-d input:focus,
.form-group-d select:focus,
.form-group-d textarea:focus { border-color: var(--teal); }

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(8,21,46,0.7);
  z-index: 200;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}

.modal-overlay.open { display: flex; }

.modal {
  background: var(--white);
  border-radius: 20px;
  padding: 28px;
  width: 520px;
  max-width: 95vw;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 24px 64px rgba(0,0,0,0.2);
}

.modal-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.modal-head h3 { font-size: 18px; font-weight: 700; color: var(--navy); }
.modal-close {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: var(--off);
  border: 1px solid #E2E8F0;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px;
}

/* ── CHECKIN ── */
.checkin-card {
  background: linear-gradient(135deg, var(--navy), var(--navy2));
  border-radius: 16px;
  padding: 22px;
  color: var(--white);
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}

.checkin-card::before {
  content: '';
  position: absolute;
  top: -30px; right: -30px;
  width: 120px; height: 120px;
  background: rgba(8,145,178,0.15);
  border-radius: 50%;
}

.checkin-times {
  display: flex;
  gap: 20px;
  margin-top: 14px;
}

.checkin-time {
  flex: 1;
  background: rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 14px;
}

.checkin-time .label { font-size: 11px; color: rgba(255,255,255,0.5); margin-bottom: 6px; }
.checkin-time .time  { font-size: 22px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
.checkin-time .time.green  { color: var(--teal-lt); }
.checkin-time .time.red    { color: #FCA5A5; }
.checkin-time .time.muted  { color: rgba(255,255,255,0.3); }

/* ── OVERVIEW PAGE ── */
.overview-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.alert-banner {
  background: linear-gradient(135deg, #FEF3C7, #FDE68A);
  border: 1px solid #F59E0B;
  border-radius: 12px;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
}

.alert-banner .icon { font-size: 22px; }
.alert-banner .text strong { font-size: 14px; color: #92400E; display: block; }
.alert-banner .text span   { font-size: 12px; color: #B45309; }

/* Loading */
.loading-state { text-align: center; padding: 40px; color: var(--slate); font-size: 14px; }
.spinner { width: 36px; height: 36px; border: 3px solid #E2E8F0; border-top-color: var(--teal); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── PROFILE OVERVIEW ── */
.profile-header {
  background: linear-gradient(135deg, var(--navy), var(--navy2));
  border-radius: 16px;
  padding: 28px;
  color: var(--white);
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 20px;
}

.profile-avatar {
  width: 72px; height: 72px;
  border-radius: 18px;
  background: linear-gradient(135deg, var(--teal), var(--blue));
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  font-weight: 800;
  flex-shrink: 0;
}

.profile-info h2 { font-size: 22px; font-weight: 800; }
.profile-info .meta { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 5px; }
.profile-stats { margin-left: auto; display: flex; gap: 20px; }
.ps-item { text-align: center; }
.ps-item .v { font-size: 24px; font-weight: 800; }
.ps-item .l { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; }

/* ── MEDIA QUERIES - RESPONSIVIDADE ── */
@media (max-width: 1024px) {
  .overview-grid { grid-template-columns: 1fr; }
  .stat-grid { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); }
}

@media (max-width: 768px) {
  :root { --sidebar-w: 0; }
  
  .sidebar {
    width: 260px;
    transform: translateX(-100%);
    transition: transform 0.3s ease;
    z-index: 200;
  }
  
  .sidebar.open { transform: translateX(0); }
  
  .main { margin-left: 0; }
  .page { padding: 16px; }
  
  .topbar {
    padding: 12px 16px;
    gap: 10px;
  }
  
  .topbar-title h2 { font-size: 18px; }
  .topbar-title p { font-size: 11px; }
  
  .topbar-right { gap: 8px; }
  .topbar-btn { width: 36px; height: 36px; font-size: 14px; }
  
  .stat-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .stat-card { flex-direction: column; text-align: center; padding: 16px; }
  .stat-icon { width: 40px; height: 40px; font-size: 18px; }
  .stat-info .value { font-size: 20px; }
  .stat-info .label { font-size: 11px; }
  
  .section-head {
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
    padding: 14px 16px;
  }
  
  .section-head h3 { font-size: 14px; }
  .section-body { padding: 12px 16px; }
  
  .data-table { font-size: 12px; }
  .data-table th, .data-table td { padding: 6px; }
  
  .data-table { width: 100%; overflow-x: auto; display: block; }
  .data-table tbody { display: block; }
  .data-table tr { display: flex; flex-wrap: wrap; margin-bottom: 16px; border: 1px solid #E2E8F0; border-radius: 8px; padding: 12px; }
  .data-table td { flex: 0 0 50%; padding: 6px; border: none; }
  
  .btn { padding: 8px 12px; font-size: 12px; }
  
  .grade-input { width: 50px; font-size: 12px; padding: 4px 6px; }
  
  .user-card { margin: 12px; padding: 10px; }
  .nav-item { padding: 8px; font-size: 12px; gap: 8px; }
  .nav-section { padding: 10px 8px 4px; }
  
  .topbar-btn { width: 36px; height: 36px; }
}

@media (max-width: 480px) {
  body { font-size: 14px; }
  
  .page { padding: 12px; }
  
  .topbar {
    padding: 10px 12px;
    flex-wrap: wrap;
  }
  
  .topbar-title h2 { font-size: 16px; }
  .topbar-right { width: 100%; margin-top: 8px; gap: 6px; }
  
  .stat-grid { grid-template-columns: 1fr; gap: 10px; }
  .stat-card { padding: 14px; gap: 12px; }
  
  .section-head h3 { font-size: 13px; }
  .section-body { padding: 10px 12px; }
  
  .data-table tr { margin-bottom: 12px; padding: 10px; }
  .data-table td { flex: 0 0 100%; padding: 4px 0; }
  .data-table th { display: none; }
  .data-table td::before {
    content: attr(data-label);
    font-weight: 600;
    color: var(--slate);
    display: inline-block;
    width: 50%;
    font-size: 11px;
  }
  
  .btn { padding: 10px; font-size: 13px; width: 100%; margin-top: 8px; }
  
  .grade-input { width: 45px; font-size: 11px; }
  
  .modal { width: 95vw; max-width: 100%; }
  
  .profile-stats { flex-direction: column; gap: 12px; margin-left: 0; margin-top: 12px; }
  
  .modal-head h3 { font-size: 16px; }

  .task-title { font-size: 13px; }
  .task-meta { font-size: 11px; }
  
  form input, form select, form textarea {
    padding: 10px;
    font-size: 16px;

</head>
<body>

<!-- ── SIDEBAR ── -->
<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="logo">🎓</div>
    <h1>School<span>Connect</span></h1>
    <p>Gestão Escolar Digital</p>
  </div>

  <div class="user-card">
    <div class="user-avatar" id="sidebarAvatar">--</div>
    <div class="user-info">
      <div class="name" id="sidebarName">Carregando...</div>
      <span class="role-badge" id="sidebarRole">-</span>
    </div>
  </div>

  <nav id="navMenu"></nav>

  <div class="sidebar-footer">
    <button class="btn-logout" onclick="logout()">🚪 Sair do sistema</button>
  </div>
</aside>

<!-- ── MAIN ── -->
<main class="main">
  <header class="topbar">
    <div style="display:flex;align-items:center;gap:12px;flex:1">
      <button id="menuToggle" class="topbar-btn" onclick="toggleMobileMenu()" style="display:none;font-size:18px" title="Menu">☰</button>
      <div class="topbar-title">
        <h2 id="topbarTitle">Dashboard</h2>
        <p id="topbarSub">Bem-vindo ao SchoolConnect</p>
      </div>
    </div>
    <div class="topbar-right">
      <div class="topbar-btn" onclick="goTo('mensagens')" title="Mensagens">
        💬<span class="dot" id="msgDot" style="display:none"></span>
      </div>
      <div class="topbar-btn" title="Calendário" onclick="goTo('calendario')">📅</div>
    </div>
  </header>

  <div id="studentStatus" style="display:none;padding:12px 32px;border-bottom:1px solid #E2E8F0"></div>

  <div id="pageContainer"></div>
</main>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalBox">
    <div class="modal-head">
      <h3 id="modalTitle">Modal</h3>
      <div class="modal-close" onclick="closeModal()">✕</div>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── STATE ──────────────────────────────────────────────────────────
let USER = null;
let STUDENT = null;
let SELECTED_STUDENT = null; // Para professor selecionar aluno temporariamente
let CURRENT_PAGE = 'overview';

// ── INIT ──────────────────────────────────────────────────────────
async function init() {
  try {
    USER = await api('/api/me');
    renderSidebar();
    await loadStudent();
    updateStudentDisplay();
    await checkMessages();
    updateMenuButtonVisibility();
    goTo('overview');
  } catch (e) {
    window.location.href = '/login';
  }
}

// ── API ───────────────────────────────────────────────────────────
async function api(url, method='GET', body=null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  if (r.status === 401 || r.status === 403) { window.location.href = '/login'; throw new Error('Unauthorized'); }
  return r.json();
}

// ── STUDENT ───────────────────────────────────────────────────────
async function loadStudent() {
  let sid = null;
  // Carregar dados do aluno baseado no perfil do usuário
  if (USER.role === 'student') {
    sid = USER.studentId;
  } else if (USER.role === 'parent') {
    sid = USER.studentIds?.[0]; // Carrega primeiro filho por padrão
  }
  // Para teacher/admin, STUDENT permanece null até selecionar
  if (sid) {
    STUDENT = await api(`/api/student/${sid}`);
  }
}

// Função para obter o aluno que deve ser visualizado
function getViewingStudent() {
  // Para professor/admin que selecionaram um aluno
  if (USER.role === 'teacher' && SELECTED_STUDENT) return SELECTED_STUDENT;
  // Para professor/admin sem seleção
  if (USER.role === 'teacher' || USER.role === 'admin') return null;
  // Para aluno/pai, retorna o STUDENT carregado na inicialização
  return STUDENT;
}

// ── SIDEBAR ───────────────────────────────────────────────────────
function renderSidebar() {
  document.getElementById('sidebarAvatar').textContent = USER.avatar || USER.name.slice(0,2).toUpperCase();
  document.getElementById('sidebarName').textContent = USER.name;
  const roleLabels = { admin: '👑 Administrador', teacher: '👨‍🏫 Professor', parent: '👨‍👩‍👧 Responsável', student: '🎒 Aluno' };
  const roleClasses = { admin: 'role-admin', teacher: 'role-teacher', parent: 'role-parent', student: 'role-student' };
  const rb = document.getElementById('sidebarRole');
  rb.textContent = roleLabels[USER.role] || USER.role;
  rb.className = `role-badge ${roleClasses[USER.role] || ''}`;

  const navMenu = document.getElementById('navMenu');
  let navItems = [];

  if (USER.role === 'admin') {
    // Admin vê: Gestão + Funções de Professor
    navItems = [
      { id: 'calendario',  icon: '🗓️',  label: 'Calendário', section: 'GESTÃO' },
      { id: 'mensagens',   icon: '💬',  label: 'Mensagens', section: 'GESTÃO' },
      { id: 'alunos',      icon: '👥',  label: 'Alunos', section: 'GESTÃO' },
      { id: 'adm',        icon: '⚙️',  label: 'Administração', section: 'GESTÃO' },
      { id: 'lancar',      icon: '✏️',  label: 'Lançar Notas', section: 'PROFESSOR' },
      { id: 'chamada',     icon: '✅',  label: 'Fazer Chamada', section: 'PROFESSOR' },
    ];
  } else {
    // Para outros usuários (student, teacher, parent)
    navItems = [
      { id: 'overview',    icon: '🏠', label: 'Visão Geral',   section: 'INÍCIO' },
      { id: 'notas',       icon: '📊', label: 'Notas & Boletim', section: null },
      { id: 'presenca',    icon: '📅', label: 'Presença & Faltas', section: null },
      { id: 'tarefas',     icon: '📚', label: 'Tarefas & Deveres', section: null },
      { id: 'calendario',  icon: '🗓️',  label: 'Calendário', section: null },
      { id: 'esportes',    icon: '🏆', label: 'Jogos Escolares', section: null },
      { id: 'mensagens',   icon: '💬', label: 'Mensagens', section: 'COMUNICAÇÃO' },
    ];

    if (USER.role === 'teacher') {
      navItems.push({ id: 'alunos',    icon: '👥', label: 'Alunos', section: 'GESTÃO' });
      navItems.push({ id: 'lancar',    icon: '✏️',  label: 'Lançar Notas', section: null });
      navItems.push({ id: 'chamada',   icon: '✅',  label: 'Fazer Chamada', section: null });
    }
  }

  let html = '';
  let lastSection = null;
  navItems.forEach(item => {
    if (item.section && item.section !== lastSection) {
      html += `<div class="nav-section">${item.section}</div>`;
      lastSection = item.section;
    }
    html += `<div class="nav-item" id="nav-${item.id}" onclick="goTo('${item.id}')">
      <span class="icon">${item.icon}</span>
      <span>${item.label}</span>
      ${item.id === 'mensagens' ? '<span class="badge" id="msgBadge" style="display:none">0</span>' : ''}
    </div>`;
  });
  navMenu.innerHTML = html;
}

async function checkMessages() {
  try {
    const msgs = await api('/api/messages');
    const unread = msgs.filter(m => !m.read).length;
    const dot = document.getElementById('msgDot');
    const badge = document.getElementById('msgBadge');
    if (unread > 0) {
      if (dot) dot.style.display = 'block';
      if (badge) { badge.style.display = 'flex'; badge.textContent = unread; }
    }
  } catch {}
}

// ── NAVIGATION ────────────────────────────────────────────────────
async function goTo(page) {
  closeMobileMenu();
  CURRENT_PAGE = page;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navEl = document.getElementById(`nav-${page}`);
  if (navEl) navEl.classList.add('active');

  const titles = {
    overview: ['Visão Geral', 'Painel completo do aluno'],
    notas: ['Notas & Boletim', 'Desempenho por disciplina'],
    presenca: ['Presença & Faltas', 'Histórico de frequência'],
    tarefas: ['Tarefas & Deveres', 'Pendências e entregas'],
    calendario: ['Calendário Escolar', 'Provas, eventos e reuniões'],
    esportes: ['Jogos Escolares', 'Atividades esportivas e competições'],
    mensagens: ['Mensagens', 'Comunicados e mensagens'],
    alunos: ['Alunos', 'Lista e gestão de alunos'],
    lancar: ['Lançar Notas', 'Registrar avaliações'],
    chamada: ['Fazer Chamada', 'Registrar presença'],
    adm: ['Administração', 'Configurações gerais'],
  };

  const [title, sub] = titles[page] || ['Página', ''];
  document.getElementById('topbarTitle').textContent = title;
  document.getElementById('topbarSub').textContent = sub;

  const container = document.getElementById('pageContainer');
  container.innerHTML = `<div class="page active"><div class="loading-state"><div class="spinner"></div>Carregando...</div></div>`;

  try {
    const html = await buildPage(page);
    container.innerHTML = `<div class="page active">${html}</div>`;
    bindPageEvents(page);
  } catch (e) {
    console.error('Erro ao carregar página:', page, e);
    container.innerHTML = `<div class="page active"><div class="loading-state" style="color:red">❌ Erro: ${e.message}</div></div>`;
  }
}

// ── PAGE BUILDERS ─────────────────────────────────────────────────
async function buildPage(page) {
  switch (page) {
    case 'overview':    return buildOverview();
    case 'notas':       return buildNotas();
    case 'presenca':    return buildPresenca();
    case 'tarefas':     return buildTarefas();
    case 'calendario':  return buildCalendario();
    case 'esportes':    return buildEsportes();
    case 'mensagens':   return buildMensagens();
    case 'alunos':      return buildAlunos();
    case 'lancar':      return buildLancarNotas();
    case 'chamada':     return buildChamada();
    case 'adm':         return buildAdm();
    default: return '<p>Página não encontrada</p>';
  }
}

// ── OVERVIEW ──────────────────────────────────────────────────────
async function buildOverview() {
  try {
    const viewingStudent = getViewingStudent();
    if (!viewingStudent) {
      console.log('Sem STUDENT, carregando Teacher Overview');
      const html = await buildOverviewTeacher();
      return html;
    }

    console.log('Carregando Overview do aluno:', viewingStudent.name);
    
    // Load data
    const [grades, { records, stats }, tasks, events, sports] = await Promise.all([
      api(`/api/grades/${viewingStudent._id}`),
      api(`/api/attendance/${viewingStudent._id}`),
      api(`/api/tasks/${viewingStudent._id}`),
      api(`/api/events?grade=${encodeURIComponent(viewingStudent.grade)}`),
      api('/api/sports')
    ]);

    // Calculate stats
    const mediaGeral = grades.filter(g=>g.media).length ? (grades.filter(g=>g.media).reduce((a,g)=>a+(g.media||0),0)/grades.filter(g=>g.media).length).toFixed(1) : '—';
    const today = new Date().toISOString().split('T')[0];
    const entradaHoje = records.find(r => r.date === today);
    const nextEvents = events.filter(e => e.date >= today).slice(0, 3);
    const myTeams = sports.filter(s => s.players?.includes(viewingStudent._id));
    
    // Process tasks
    const tasksWithMeta = tasks.map(t => ({
      ...t,
      overdue: !t.completion?.done && t.dueDate < today,
      daysLeft: Math.ceil((new Date(t.dueDate) - new Date()) / 86400000),
    }));
    const pendentes = tasksWithMeta.filter(t => !t.completion?.done).length;
    const atrasadas = tasksWithMeta.filter(t => !t.completion?.done && t.dueDate < today).length;

    const alertsHtml = atrasadas > 0 ? `
    <div class="alert-banner">
      <div class="icon">⚠️</div>
      <div class="text">
        <strong>${atrasadas} tarefa${atrasadas!==1?'s':''} em atraso!</strong>
        <span>Clique em "Tarefas" para ver detalhes</span>
      </div>
    </div>` : '';

  return `
  ${alertsHtml}

  <!-- Profile header -->
  <div class="profile-header">
    <div class="profile-avatar">${STUDENT.photo}</div>
    <div class="profile-info">
      <h2>${STUDENT.name}</h2>
      <div class="meta">${STUDENT.grade} · Turno ${STUDENT.turno} · Matrícula ${STUDENT.matricula}</div>
      <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
        ${entradaHoje ? `<span class="badge badge-green">✓ Entrada: ${entradaHoje.horarioEntrada || '—'}</span>` : `<span class="badge badge-gray">📅 Sem registro hoje</span>`}
        ${entradaHoje?.horarioSaida ? `<span class="badge badge-blue">Saída: ${entradaHoje.horarioSaida}</span>` : ''}
      </div>
    </div>
    <div class="profile-stats">
      <div class="ps-item"><div class="v" style="color:var(--teal-lt)">${mediaGeral}</div><div class="l">Média Geral</div></div>
      <div class="ps-item"><div class="v" style="color:${stats.percentual >= 75 ? 'var(--teal-lt)' : '#FCA5A5'}">${stats.percentual}%</div><div class="l">Frequência</div></div>
      <div class="ps-item"><div class="v" style="color:${atrasadas>0?'#FCA5A5':'var(--teal-lt)'}">${pendentes}</div><div class="l">Pendências</div></div>
    </div>
  </div>

  <!-- Stat cards -->
  <div class="stat-grid">
    <div class="stat-card">
      <div class="stat-icon" style="background:#EFF6FF">📊</div>
      <div class="stat-info">
        <div class="value" style="color:var(--blue)">${mediaGeral}</div>
        <div class="label">Média Geral</div>
        <div class="sub" style="color:var(--slate)">${grades.filter(g=>g.status==='aprovado').length}/${grades.length} aprovado</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:${stats.percentual>=75?'#ECFDF5':'#FEF2F2'}">📅</div>
      <div class="stat-info">
        <div class="value" style="color:${stats.percentual>=75?'var(--green)':'var(--red)'}">${stats.percentual}%</div>
        <div class="label">Frequência</div>
        <div class="sub" style="color:var(--slate)">${stats.faltas} falta${stats.faltas!==1?'s':''} · ${stats.atrasos} atraso${stats.atrasos!==1?'s':''}</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:#FFF7ED">📚</div>
      <div class="stat-info">
        <div class="value" style="color:${atrasadas>0?'var(--red)':'var(--orange)'}">${pendentes}</div>
        <div class="label">Tarefas Pendentes</div>
        <div class="sub" style="color:${atrasadas>0?'var(--red)':'var(--slate)'}">${atrasadas > 0 ? `⚠ ${atrasadas} em atraso` : 'Sem atrasos'}</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:#FEF3C7">🏆</div>
      <div class="stat-info">
        <div class="value" style="color:var(--gold)">${myTeams.length}</div>
        <div class="label">Times / Atividades</div>
        <div class="sub" style="color:var(--slate)">${myTeams.map(t=>t.modality).join(', ') || 'Nenhum'}</div>
      </div>
    </div>
  </div>

  <div class="overview-grid">
    <!-- Notas recentes -->
    <div class="section-card">
      <div class="section-head">
        <h3>📊 Desempenho por Disciplina</h3>
        <button class="btn btn-outline btn-sm" onclick="goTo('notas')">Ver todas →</button>
      </div>
      <div class="section-body">
        ${grades.slice(0,6).map(g => `
          <div style="margin-bottom:14px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
              <span style="font-size:13px;font-weight:600;color:var(--slate-dk)">${g.subject}</span>
              <span class="badge ${g.status==='aprovado'?'badge-green':g.status==='reprovado'?'badge-red':'badge-orange'}" style="font-size:11px">${g.media ?? '—'}</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" style="width:${Math.min((g.media||0)/10*100,100)}%;background:${g.media>=7?'var(--green)':g.media>=5?'var(--gold)':'var(--red)'}"></div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>

    <!-- Próximos eventos -->
    <div class="section-card">
      <div class="section-head">
        <h3>🗓️ Próximos Eventos</h3>
        <button class="btn btn-outline btn-sm" onclick="goTo('calendario')">Ver todos →</button>
      </div>
      <div class="section-body">
        ${nextEvents.map(ev => {
          const d = new Date(ev.date + 'T12:00:00');
          const colors = { prova:'var(--red)', reunião:'var(--blue)', evento:'var(--purple)', esporte:'var(--gold)', feriado:'var(--green)' };
          return `
          <div class="event-item">
            <div class="event-date-box" style="background:${colors[ev.type]||'var(--slate)'}20;color:${colors[ev.type]||'var(--slate)'}">
              <div class="day">${d.getDate()}</div>
              <div class="mon">${d.toLocaleString('pt-BR',{month:'short'})}</div>
            </div>
            <div class="event-info">
              <div class="title">${ev.title}</div>
              <div class="desc">${ev.description || ev.subject || ''}</div>
            </div>
            <span class="badge ${ev.type==='prova'?'badge-red':ev.type==='reunião'?'badge-blue':'badge-purple'}">${ev.type}</span>
          </div>`;
        }).join('') || '<p style="color:var(--slate);font-size:13px">Sem eventos próximos</p>'}
      </div>
    </div>

    <!-- Tarefas -->
    <div class="section-card">
      <div class="section-head">
        <h3>📚 Tarefas Recentes</h3>
        <button class="btn btn-outline btn-sm" onclick="goTo('tarefas')">Ver todas →</button>
      </div>
      <div class="section-body">
        ${tasks.slice(0,5).map(t => {
          const done = t.completion?.done;
          const color = done ? 'var(--green)' : t.overdue ? 'var(--red)' : 'var(--gold)';
          const dlColor = t.daysLeft < 0 ? 'badge-red' : t.daysLeft <= 2 ? 'badge-orange' : 'badge-blue';
          return `
          <div class="task-item">
            <div class="task-status-dot" style="background:${color}"></div>
            <div class="task-info">
              <div class="task-title">${t.title}</div>
              <div class="task-meta">${t.subject} · ${t.teacher}</div>
            </div>
            <span class="badge ${done?'badge-green':t.overdue?'badge-red':dlColor}" style="font-size:11px">
              ${done ? '✓ Entregue' : t.overdue ? 'Atrasado' : t.daysLeft <= 0 ? 'Hoje' : `${t.daysLeft}d`}
            </span>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- Check-in recente -->
    <div>
      <div class="checkin-card">
        <div style="font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:4px">FREQUÊNCIA DO MÊS</div>
        <div style="font-size:32px;font-weight:800;color:${stats.percentual>=75?'var(--teal-lt)':'#FCA5A5'}">${stats.percentual}%</div>
        <div class="checkin-times">
          <div class="checkin-time">
            <div class="label">PRESENTES</div>
            <div class="time green">${stats.presentes}</div>
          </div>
          <div class="checkin-time">
            <div class="label">FALTAS</div>

// ── NOTAS ─────────────────────────────────────────────────────────
async function buildNotas() {
  const viewingStudent = getViewingStudent();
  if (!viewingStudent) return `<div class="section-card" style="text-align:center;padding:40px"><p style="font-size:16px;color:var(--slate)">📋 Professor: Selecione um aluno na aba 'Alunos' para visualizar notas</p></div>`;
  const grades = await api(`/api/grades/${viewingStudent._id}`);

  const avg = (g) => {
    const vals = [g.bimestre1, g.bimestre2, g.bimestre3, g.bimestre4].filter(v=>v!==null);
    return vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1) : '—';
  };

  const mediaGeral = grades.filter(g=>g.media).length ?
    (grades.filter(g=>g.media).reduce((a,g)=>a+(g.media||0),0)/grades.filter(g=>g.media).length).toFixed(1) : '—';

  return `
  <div class="stat-grid" style="grid-template-columns:repeat(4,1fr)">
    <div class="stat-card"><div class="stat-icon" style="background:#EFF6FF">🎯</div>
      <div class="stat-info"><div class="value">${mediaGeral}</div><div class="label">Média Geral</div></div></div>
    <div class="stat-card"><div class="stat-icon" style="background:#ECFDF5">✅</div>
      <div class="stat-info"><div class="value" style="color:var(--green)">${grades.filter(g=>g.status==='aprovado').length}</div><div class="label">Aprovado</div></div></div>
    <div class="stat-card"><div class="stat-icon" style="background:#FEF3C7">⚠️</div>
      <div class="stat-info"><div class="value" style="color:var(--gold)">${grades.filter(g=>g.status==='recuperação').length}</div><div class="label">Recuperação</div></div></div>
    <div class="stat-card"><div class="stat-icon" style="background:#FEF2F2">❌</div>
      <div class="stat-info"><div class="value" style="color:var(--red)">${grades.filter(g=>g.status==='reprovado').length}</div><div class="label">Reprovado</div></div></div>
  </div>

  <div class="section-card">
    <div class="section-head"><h3>📋 Boletim Completo — ${viewingStudent.grade}</h3>
      <span style="font-size:12px;color:var(--slate)">3º Bimestre em andamento</span></div>
    <div class="section-body" style="padding:0">
      <table class="data-table">
        <thead>
          <tr>
            <th>Disciplina</th><th>1º Bim</th><th>2º Bim</th><th>3º Bim</th><th>4º Bim</th><th>Média</th><th>Situação</th>
          </tr>
        </thead>
        <tbody>
          ${grades.map(g => {
            const m = g.media;
            const statusClass = g.status==='aprovado'?'badge-green':g.status==='reprovado'?'badge-red':'badge-orange';
            const statusLabel = g.status==='aprovado'?'✓ Aprovado':g.status==='reprovado'?'✗ Reprovado':'⚠ Recuperação';
            const gradeColor = (v) => v===null?'#CBD5E1':v>=7?'var(--green)':v>=5?'var(--gold)':'var(--red)';
            return `
            <tr>
              <td><strong style="font-size:13px">${g.subject}</strong><div style="font-size:11px;color:var(--slate)">${g.teacher}</div></td>
              ${[g.bimestre1,g.bimestre2,g.bimestre3,g.bimestre4].map(v=>`
                <td><span class="grade-val" style="background:${gradeColor(v)}18;color:${gradeColor(v)}">${v??'—'}</span></td>
              `).join('')}
              <td><span class="grade-val" style="font-size:16px;font-weight:800;color:${gradeColor(m)}">${m??'—'}</span></td>
              <td><span class="badge ${statusClass}">${statusLabel}</span></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

// ── TAREFAS ───────────────────────────────────────────────────────
async function buildTarefas() {
  const viewingStudent = getViewingStudent();
  if (!viewingStudent) return `<div class="section-card" style="text-align:center;padding:40px"><p style="font-size:16px;color:var(--slate)">📚 Professor: Selecione um aluno na aba 'Alunos' para visualizar tarefas</p></div>`;
  const tasks = await api(`/api/tasks/${viewingStudent._id}`);

  const done = tasks.filter(t=>t.completion?.done);
  const pending = tasks.filter(t=>!t.completion?.done && !t.overdue);
  const overdue = tasks.filter(t=>t.overdue);

  const renderTask = (t, showComplete=false) => {
    const d = t.completion?.done;
    const color = d?'var(--green)':t.overdue?'var(--red)':'var(--gold)';
    return `
    <div class="task-item" style="padding:16px;background:var(--white);border-radius:12px;margin-bottom:10px;border:1.5px solid ${d?'#D1FAE5':t.overdue?'#FEE2E2':'#FEF3C7'}">
      <div class="task-status-dot" style="background:${color};width:12px;height:12px"></div>
      <div class="task-info" style="flex:1">
        <div class="task-title">${t.title}</div>
        <div class="task-meta">${t.subject} · ${t.teacher}</div>
        <div style="font-size:12px;color:var(--slate);margin-top:5px">${t.description}</div>
        ${t.completion?.grade ? `<div style="margin-top:6px"><span class="badge badge-green">Nota: ${t.completion.grade}</span></div>` : ''}
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:11px;color:var(--slate);margin-bottom:4px">Prazo</div>
        <div style="font-size:13px;font-weight:700;color:${t.overdue?'var(--red)':t.daysLeft<=2?'var(--orange)':'var(--slate-dk)'}">${new Date(t.dueDate+'T12:00:00').toLocaleDateString('pt-BR')}</div>
        <div class="badge ${d?'badge-green':t.overdue?'badge-red':t.daysLeft<=2?'badge-orange':'badge-blue'}" style="margin-top:6px;font-size:11px">
          ${d?'✓ Entregue':t.overdue?'Atrasado':t.daysLeft===0?'Hoje':t.daysLeft===1?'Amanhã':`${t.daysLeft} dias`}
        </div>
        ${showComplete && !d ? `<button class="btn btn-primary btn-sm" style="margin-top:8px" onclick="markDone('${t._id}','${viewingStudent._id}')">Marcar feito</button>` : ''}
      </div>
    </div>`;
  };

  return `
  <div class="stat-grid" style="grid-template-columns:repeat(3,1fr)">
    <div class="stat-card"><div class="stat-icon" style="background:#FFF7ED">📝</div>
      <div class="stat-info"><div class="value" style="color:var(--gold)">${pending.length}</div><div class="label">Pendentes</div></div></div>
    <div class="stat-card"><div class="stat-icon" style="background:#FEF2F2">⚠️</div>
      <div class="stat-info"><div class="value" style="color:var(--red)">${overdue.length}</div><div class="label">Em Atraso</div></div></div>
    <div class="stat-card"><div class="stat-icon" style="background:#ECFDF5">✅</div>
      <div class="stat-info"><div class="value" style="color:var(--green)">${done.length}</div><div class="label">Entregues</div></div></div>
  </div>

  ${overdue.length > 0 ? `
  <div style="margin-bottom:20px">
    <h3 style="font-size:14px;font-weight:700;color:var(--red);margin-bottom:12px;display:flex;align-items:center;gap:6px">⚠️ Em Atraso (${overdue.length})</h3>
    ${overdue.map(t=>renderTask(t,true)).join('')}
  </div>` : ''}

  ${pending.length > 0 ? `
  <div style="margin-bottom:20px">
    <h3 style="font-size:14px;font-weight:700;color:var(--gold);margin-bottom:12px;display:flex;align-items:center;gap:6px">📝 Pendentes (${pending.length})</h3>
    ${pending.map(t=>renderTask(t,true)).join('')}
  </div>` : ''}

  ${done.length > 0 ? `
  <div>
    <h3 style="font-size:14px;font-weight:700;color:var(--green);margin-bottom:12px;display:flex;align-items:center;gap:6px">✅ Entregues (${done.length})</h3>
    ${done.map(t=>renderTask(t,false)).join('')}
  </div>` : ''}`;
}

// ── CALENDÁRIO ────────────────────────────────────────────────────
async function buildCalendario() {
  const viewingStudent = getViewingStudent();
  const grade = viewingStudent?.grade || '';
  const events = await api(`/api/events?grade=${encodeURIComponent(grade)}`);

  const typeIcons = { prova:'📝', reunião:'👥', evento:'🎉', esporte:'⚽', feriado:'🌟' };
  const typeColors = { prova:'badge-red', reunião:'badge-blue', evento:'badge-purple', esporte:'badge-gold', feriado:'badge-green' };

  const groupedByMonth = {};
  events.forEach(ev => {
    const d = new Date(ev.date+'T12:00:00');
    const key = d.toLocaleString('pt-BR',{month:'long',year:'numeric'});
    if (!groupedByMonth[key]) groupedByMonth[key] = [];
    groupedByMonth[key].push(ev);
  });

  return `
  <div class="stat-grid" style="grid-template-columns:repeat(5,1fr)">
    ${Object.entries(typeIcons).map(([type,icon])=>`
    <div class="stat-card" style="cursor:pointer">
      <div class="stat-icon" style="background:var(--off2);font-size:22px">${icon}</div>
      <div class="stat-info"><div class="value" style="font-size:24px">${events.filter(e=>e.type===type).length}</div><div class="label">${type.charAt(0).toUpperCase()+type.slice(1)}</div></div>
    </div>`).join('')}
  </div>

  ${Object.entries(groupedByMonth).map(([month, evs]) => `
  <div class="section-card" style="margin-bottom:16px">
    <div class="section-head">
      <h3>📅 ${month.charAt(0).toUpperCase()+month.slice(1)}</h3>
      <span class="badge badge-navy">${evs.length} evento${evs.length!==1?'s':''}</span>
    </div>
    <div class="section-body" style="padding:0">
      <table class="data-table">
        <thead><tr><th>Data</th><th>Evento</th><th>Tipo</th><th>Turma</th><th>Detalhes</th></tr></thead>
        <tbody>
          ${evs.map(ev => {
            const d = new Date(ev.date+'T12:00:00');
            return `
            <tr>
              <td><strong>${d.toLocaleDateString('pt-BR')}</strong><div style="font-size:11px;color:var(--slate)">${d.toLocaleString('pt-BR',{weekday:'long'})}</div></td>
              <td><strong>${typeIcons[ev.type]||'📌'} ${ev.title}</strong></td>
              <td><span class="badge ${typeColors[ev.type]||'badge-gray'}">${ev.type}</span></td>
              <td>${ev.grade}</td>
              <td style="font-size:12px;color:var(--slate)">${ev.description||'—'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>`).join('')}`;
}

async function buildLancarNotas() {
  const students = await api('/api/students');
  const allGrades = [];
  for (const s of students) {
    const grades = await api(`/api/grades/${s._id}`);
    grades.forEach(g => allGrades.push({ ...g, studentName: s.name, studentPhoto: s.photo }));
  }
  
  return `
  <div class="section-card">
    <div class="section-head"><h3>✏️ Lançar / Editar Notas</h3>
      <span style="font-size:12px;color:var(--slate)">Clique no campo para editar</span></div>
    <div class="section-body" style="padding:0">
      <table class="data-table">
        <thead><tr><th>Aluno</th><th>Disciplina</th><th>1º Bim</th><th>2º Bim</th><th>3º Bim</th><th>4º Bim</th><th>Média</th><th>Ação</th></tr></thead>
        <tbody>
          ${allGrades.map(g => `
            <tr>
              <td><div class="student-row"><div class="student-ava">${g.studentPhoto}</div>${g.studentName}</div></td>
              <td>${g.subject}</td>
              ${[1,2,3,4].map(b=>`<td><input class="grade-input" type="number" step="0.1" min="0" max="10" value="${g['bimestre'+b]??''}" data-id="${g._id}" data-b="bimestre${b}" placeholder="—"></td>`).join('')}
              <td><span class="grade-val" style="font-size:15px;font-weight:800;color:${g.media>=7?'var(--green)':g.media>=5?'var(--gold)':'var(--red)'}">${g.media??'—'}</span></td>
              <td><button class="btn btn-primary btn-sm" onclick="saveGrade('${g._id}')">Salvar</button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}


async function saveGrade(gradeId) {
  const inputs = document.querySelectorAll(`[data-id="${gradeId}"]`);
  const updates = {};
  let values = [];
  inputs.forEach(inp => {
    const val = inp.value !== '' ? parseFloat(inp.value) : null;
    updates[inp.dataset.b] = val;
    if (val !== null) values.push(val);
  });
  await api(`/api/grades/${gradeId}`, 'PUT', updates);
  
  // Recalcular média
  const media = values.length > 0 ? (values.reduce((a,b) => a+b) / values.length).toFixed(1) : '—';
  const row = document.querySelector(`[data-id="${gradeId}"]`).closest('tr');
  const mediaCell = row.querySelector('.grade-val');
  mediaCell.textContent = media;
  mediaCell.style.color = media !== '—' ? (media >= 7 ? 'var(--green)' : media >= 5 ? 'var(--gold)' : 'var(--red)') : 'inherit';
  
  showToast('✅ Nota salva com sucesso!');
}

  const students = await api('/api/students');

      <h3>✅ Chamada — ${new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'})}</h3>
      <button class="btn btn-primary" onclick="saveChamada()">💾 Salvar Chamada</button>
    </div>
    <div class="section-body" style="padding:0">
      <table class="data-table">
        <thead><tr><th>Aluno</th><th>Turma</th><th>Status</th><th>Entrada</th><th>Saída</th></tr></thead>

          ${students.map(s=>`
            <tr>
              <td><div class="student-row"><div class="student-ava">${s.photo}</div><strong>${s.name}</strong></div></td>

                  <option value="presente">✓ Presente</option>
                  <option value="falta">✗ Falta</option>
                  <option value="atrasado">⏰ Atrasado</option>
                </select>
              </td>
              <td><input class="grade-input" type="time" data-sid="${s._id}" data-field="entrada" value="07:30"></td>

async function saveChamada() {
  const statuses = document.querySelectorAll('.att-status');
  const promises = [];
  statuses.forEach(sel => {
    const sid = sel.dataset.sid;
    const status = sel.value;
    const entrada = document.querySelector(`[data-sid="${sid}"][data-field="entrada"]`)?.value;
    const saida   = document.querySelector(`[data-sid="${sid}"][data-field="saida"]`)?.value;
    promises.push(api('/api/attendance', 'POST', {
      studentId: sid, date: new Date().toISOString().split('T')[0],
      status, horarioEntrada: entrada || null, horarioSaida: saida || null
    }));
  });
  await Promise.all(promises);
  showToast('✅ Chamada salva com sucesso!');
}

async function addEvent() {

  const desc  = document.getElementById('evDesc').value;
  if (!title || !date) { showToast('⚠️ Preencha título e data'); return; }

  document.getElementById('evDate').value = '';

async function viewStudent(sid) {
  const s = await api(`/api/student/${sid}`);
  const [grades, att, tasks] = await Promise.all([
    api(`/api/grades/${sid}`),
    api(`/api/attendance/${sid}`),
    api(`/api/tasks/${sid}`)
  ]);
  const mediaGeral = grades.filter(g=>g.media).length ? (grades.filter(g=>g.media).reduce((a,g)=>a+(g.media||0),0)/grades.filter(g=>g.media).length).toFixed(1) : '—';
  openModal(`Perfil: ${s.name}`, `
    <div style="display:flex;gap:14px;align-items:center;background:var(--navy);border-radius:12px;padding:18px;margin-bottom:18px">
      <div style="width:60px;height:60px;background:linear-gradient(135deg,var(--teal),var(--blue));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff">${s.photo}</div>
      <div><div style="font-size:18px;font-weight:800;color:#fff">${s.name}</div>
        <div style="font-size:13px;color:rgba(255,255,255,0.5)">${s.grade} · ${s.turno} · Matr. ${s.matricula}</div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <span class="badge badge-green" style="font-size:11px">Média: ${mediaGeral}</span>
          <span class="badge ${att.stats.percentual>=75?'badge-green':'badge-red'}" style="font-size:11px">Freq: ${att.stats.percentual}%</span>
          <span class="badge badge-orange" style="font-size:11px">Pendentes: ${tasks.filter(t=>!t.completion?.done).length}</span>
        </div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      ${grades.slice(0,6).map(g=>`
        <div style="background:var(--off);border-radius:10px;padding:12px;display:flex;justify-content:space-between">
          <span style="font-size:13px;color:var(--slate-dk)">${g.subject}</span>
          <span class="grade-val" style="color:${g.media>=7?'var(--green)':g.media>=5?'var(--gold)':'var(--red)'}">${g.media??'—'}</span>
        </div>`).join('')}
    </div>
  `);
}

function updateStudentDisplay() {
  const statusEl = document.getElementById('studentStatus');
  if (SELECTED_STUDENT) {
    statusEl.style.display = 'block';
    statusEl.innerHTML = `<div style="display:flex;align-items:center;gap:12px">
      <span style="font-size:18px">${SELECTED_STUDENT.photo}</span>
      <div>
        <div style="font-size:13px;font-weight:600;color:var(--navy)">Aluno selecionado: ${SELECTED_STUDENT.name}</div>
        <div style="font-size:11px;color:var(--slate)">${SELECTED_STUDENT.grade} · Matr. ${SELECTED_STUDENT.matricula}</div>
      </div>
      <button class="btn btn-outline btn-sm" style="margin-left:auto;padding:6px 12px;font-size:12px" onclick="clearStudent()">Limpar seleção</button>
    </div>`;
  } else {
    statusEl.style.display = 'none';
  }
}

function clearStudent() {
  SELECTED_STUDENT = null;
  updateStudentDisplay();
  const currentPage = document.querySelector('.page.active');
  if (currentPage) {
    const pageId = currentPage.id.replace('page-', '');
    if (['notas', 'presenca', 'tarefas'].includes(pageId)) {
      goTo(pageId);
    }
  }
}

async function sendNewMessage() {
  const to = document.getElementById('msgTo').value;
  const subject = document.getElementById('msgSubject').value;
  const body = document.getElementById('msgBody').value;
  
  if (!to || !subject || !body) {
    showToast('⚠️ Preencha todos os campos');
    return;
  }

  try {
    await api('/api/messages', 'POST', { to, subject, body });
    showToast('✅ Mensagem enviada!');
    closeModal();
    goTo('mensagens');
  } catch (e) {
    showToast('❌ Erro ao enviar');
  }
}

// ── MODAL ─────────────────────────────────────────────────────────
function openModal(title, body) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('open');
}

// ── TOAST ─────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── MOBILE MENU ──────────────────────────────────────────────────
function toggleMobileMenu() {
  const sidebar = document.querySelector('.sidebar');
  if (sidebar) {
    sidebar.classList.toggle('open');
  }
}

function closeMobileMenu() {
  const sidebar = document.querySelector('.sidebar');
  if (sidebar && window.innerWidth <= 768) {
    sidebar.classList.remove('open');
  }
}

// Mostrar/ocultar botão de menu baseado na largura da tela
function updateMenuButtonVisibility() {
  const menuToggle = document.getElementById('menuToggle');
  if (menuToggle) {
    menuToggle.style.display = window.innerWidth <= 768 ? 'flex' : 'none';
  }
}
